<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 512 512" role="img"
  aria-label="AgentStudio favicon">
  <defs>
    <radialGradient id="bgF" cx="50%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#0f1f0b" />
      <stop offset="50%" stop-color="#070d06" />
      <stop offset="100%" stop-color="#030503" />
    </radialGradient>
    <radialGradient id="nebF" cx="35%" cy="30%" r="45%">
      <stop offset="0%" stop-color="#65a30d" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#000" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="nebF2" cx="70%" cy="65%" r="40%">
      <stop offset="0%" stop-color="#84cc16" stop-opacity="0.07" />
      <stop offset="100%" stop-color="#000" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="nebF3" cx="25%" cy="70%" r="35%">
      <stop offset="0%" stop-color="#a3e635" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#000" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="limeF" x1="256" y1="100" x2="256" y2="410" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d9f99d" />
      <stop offset="40%" stop-color="#a3e635" />
      <stop offset="100%" stop-color="#4d7c0f" />
    </linearGradient>
    <linearGradient id="ringFa" x1="60" y1="270" x2="452" y2="270" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a3e635" stop-opacity="0" />
      <stop offset="25%" stop-color="#a3e635" stop-opacity="0.25" />
      <stop offset="50%" stop-color="#84cc16" stop-opacity="0.4" />
      <stop offset="75%" stop-color="#a3e635" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#84cc16" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="ringFb" x1="100" y1="320" x2="412" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#84cc16" stop-opacity="0" />
      <stop offset="30%" stop-color="#84cc16" stop-opacity="0.15" />
      <stop offset="70%" stop-color="#65a30d" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#84cc16" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bgF)" />
  <rect width="512" height="512" rx="112" fill="url(#nebF)" />
  <rect width="512" height="512" rx="112" fill="url(#nebF2)" />
  <rect width="512" height="512" rx="112" fill="url(#nebF3)" />

  <!-- Subtle border -->
  <rect x="2" y="2" width="508" height="508" rx="111" fill="none" stroke="#84cc16"
    stroke-opacity="0.06" stroke-width="1" />

  <!-- Star field — larger visible stars -->
  <circle cx="88" cy="100" r="3" fill="#fff" opacity="0.5" />
  <circle cx="415" cy="82" r="3.5" fill="#fff" opacity="0.4" />
  <circle cx="370" cy="140" r="2.5" fill="#d9f99d" opacity="0.4" />
  <circle cx="140" cy="160" r="2" fill="#fff" opacity="0.35" />
  <circle cx="430" cy="210" r="2.8" fill="#fff" opacity="0.35" />
  <circle cx="75" cy="270" r="2" fill="#d9f99d" opacity="0.3" />
  <circle cx="100" cy="390" r="2.5" fill="#fff" opacity="0.4" />
  <circle cx="405" cy="370" r="3" fill="#d9f99d" opacity="0.35" />
  <circle cx="440" cy="430" r="2" fill="#fff" opacity="0.3" />
  <circle cx="65" cy="440" r="2.5" fill="#fff" opacity="0.25" />
  <circle cx="310" cy="75" r="2" fill="#fff" opacity="0.35" />
  <circle cx="455" cy="295" r="2.5" fill="#fff" opacity="0.25" />
  <!-- Bright accent stars -->
  <circle cx="395" cy="115" r="4" fill="#a3e635" opacity="0.3" />
  <circle cx="110" cy="130" r="3.5" fill="#a3e635" opacity="0.2" />
  <circle cx="425" cy="405" r="3" fill="#a3e635" opacity="0.18" />
  <circle cx="80" cy="415" r="3.5" fill="#a3e635" opacity="0.15" />

  <!-- Orbital rings -->
  <ellipse cx="256" cy="280" rx="200" ry="50" fill="none" stroke="url(#ringFa)" stroke-width="1.8"
    transform="rotate(-10 256 280)" />
  <ellipse cx="256" cy="310" rx="170" ry="38" fill="none" stroke="url(#ringFb)" stroke-width="1.2"
    transform="rotate(6 256 310)" />

  <!-- Thick uniform A — flat top, consistent stroke width -->
  <polygon points="226,110 286,110 192,410 128,410" fill="url(#limeF)" />
  <polygon points="226,110 286,110 384,410 320,410" fill="url(#limeF)" />
  <rect x="175" y="295" width="162" height="42" rx="3" fill="url(#limeF)" />
  <!-- Counter (hole) matches background -->
  <clipPath id="counterClip">
    <polygon points="256,185 210,295 302,295" />
  </clipPath>
  <g clip-path="url(#counterClip)">
    <rect width="512" height="512" fill="url(#bgF)" />
    <rect width="512" height="512" fill="url(#nebF)" />
    <rect width="512" height="512" fill="url(#nebF2)" />
    <rect width="512" height="512" fill="url(#nebF3)" />
  </g>
</svg>