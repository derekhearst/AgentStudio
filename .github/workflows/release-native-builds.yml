name: Build Native Release Artifacts

on:
  release:
    types: [published]

jobs:
  build-windows-exe:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Tauri icons
        run: bun run tauri:icons

      - name: Build Windows bundle
        run: bunx tauri build --bundles nsis

      - name: Collect EXE artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist\windows -Force | Out-Null
          Get-ChildItem -Path src-tauri\target\release\bundle -Filter *.exe -Recurse | Copy-Item -Destination dist\windows -Force

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/windows/*.exe
          if-no-files-found: error

  build-android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Rust (Android target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Tauri icons
        run: bun run tauri:icons

      - name: Initialize Android project
        run: bunx tauri android init --ci

      - name: Build Android APK
        run: bunx tauri android build --apk --target aarch64

      - name: Collect APK artifacts
        run: |
          mkdir -p dist/android
          find src-tauri -type f -name "*.apk" -exec cp {} dist/android/ \;

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/android/*.apk
          if-no-files-found: error

  attach-assets-to-release:
    name: Attach Artifacts to Release
    runs-on: ubuntu-latest
    needs: [build-windows-exe, build-android-apk]
    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: dist/windows

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: dist/android

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/windows/*.exe
            dist/android/*.apk
          fail_on_unmatched_files: true
